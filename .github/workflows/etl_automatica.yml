name: Ejecucion ETL Medallion Medianoche

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-silver-layer:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente PostgreSQL 16
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Test conexion
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "=== Test ping al host ==="
          nc -zv aws-1-us-east-2.pooler.supabase.com 5432 || echo "Puerto 5432 BLOQUEADO"
          nc -zv aws-1-us-east-2.pooler.supabase.com 6543 || echo "Puerto 6543 BLOQUEADO"

          echo "=== Test sslmode=disable ==="
          psql "host=aws-1-us-east-2.pooler.supabase.com port=5432 dbname=postgres user=postgres.xjzcfiusbhrvcbfpqqbz sslmode=disable connect_timeout=30" -c "SELECT 1;" || echo "FALLO sin SSL"

          echo "=== Test puerto 6543 con SSL ==="
          psql "host=aws-1-us-east-2.pooler.supabase.com port=6543 dbname=postgres user=postgres.xjzcfiusbhrvcbfpqqbz sslmode=require connect_timeout=30" -c "SELECT 1;" || echo "FALLO puerto 6543"

          echo "=== Test sslmode=prefer ==="
          psql "host=aws-1-us-east-2.pooler.supabase.com port=5432 dbname=postgres user=postgres.xjzcfiusbhrvcbfpqqbz sslmode=prefer connect_timeout=30" -c "SELECT 1;" || echo "FALLO sslmode=prefer"

      - name: Ejecutar SP si conexion OK
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql "host=aws-1-us-east-2.pooler.supabase.com port=6543 dbname=postgres user=postgres.xjzcfiusbhrvcbfpqqbz sslmode=require connect_timeout=30" -c "SELECT silver.sp_load_estudiantes();"
          psql "host=aws-1-us-east-2.pooler.supabase.com port=6543 dbname=postgres user=postgres.xjzcfiusbhrvcbfpqqbz sslmode=require connect_timeout=30" -c "SELECT silver.sp_load_matriculas();"